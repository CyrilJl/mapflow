name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        python-version: "3.12"

    - name: Install ffmpeg
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

    - name: Install dependencies
      run: uv pip install --system -e ".[test]"

    - name: Run pytest
      run: pytest tests/ -vv -s

  format:
    runs-on: ubuntu-latest
    needs: test  # S'exécute seulement après le job test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Run ruff format
        run: uvx ruff format .

      - name: Commit changes
        if: success()
        run: |
          git diff --quiet || (git add . && \
          git -c user.name="GitHub Actions" \
              -c user.email="actions@github.com" \
              commit -m "Format code with Ruff" && \
          git push)